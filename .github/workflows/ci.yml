name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Functional tests (Chromium desktop)
        run: npx playwright test tests/homepage.spec.ts --project=chromium-desktop-1440

      - name: Cross-device layout tests (Chromium — mobile + desktop)
        run: npx playwright test tests/cross-device.spec.ts --project=chromium-desktop-1440 --project=chromium-phone-360

      - name: Accessibility tests (WCAG 2.1 AA)
        run: npm run test:a11y

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
