version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Vancouver
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      # Only auto-update patch versions for Astro — minor/major require manual review
      - dependency-name: astro
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@astrojs/*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Vancouver
    open-pull-requests-limit: 5
    labels:
      - dependencies
